<!DOCTYPE html>
<html>

<head>

<title>Resume History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">

Resume Analysis History

</h2>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Email</th>

<th>Phone</th>

<th>ATS Score</th>

</tr>

</thead>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}%</td>
<td>{{ row[4] }}</td>

<tbody>

{% for row in history %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}%</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/" class="btn btn-primary">

Analyze Another Resume

</a>

</div>

</body>

</html>
